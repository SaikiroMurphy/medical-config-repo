message=Welcome to the Patient Service! From Config Server!
app.welcome=Chào mừng tới BV RikkeiEducation

spring.application.name=patient-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/patient_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database=POSTGRESQL

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jackson.mapper.sort-properties-alphabetically=false
spring.jackson.deserialization.fail-on-unknown-properties=true