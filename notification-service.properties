spring.application.name=notification-service
server.port=8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.jackson.mapper.sort-properties-alphabetically=false
spring.jackson.deserialization.fail-on-unknown-properties=true

resilience4j.circuitbreaker.instances.warehouseCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.warehouseCB.wait-duration-in-open-state=20s

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=re.edu.notification_service.event.OrderEvent